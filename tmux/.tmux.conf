### GENERAL SETTINGS ###
# Update interval and window naming
set-option -g status-interval 5
if-shell 'test -x /usr/bin/zsh' 'set-option -g default-shell /usr/bin/zsh' 'if-shell "test -x /bin/zsh" "set-option -g default-shell /bin/zsh"'
set-option -g status-position bottom
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{b:pane_current_path}'
set-window-option -g mode-keys vi
set-option -g mouse on
set-option -g set-clipboard on
set-option -g focus-events on
set-option -g history-limit 100000
set-option -g allow-passthrough on
set-option -g base-index 1
set-window-option -g pane-base-index 1

# Prefix: Ctrl+Space (matches Neovim's Space leader)
unbind C-b
set-option -g prefix C-Space
bind C-Space send-prefix

### KEYBINDINGS ###
# Ctrl+D: pass through to shell in normal mode, half-page down in copy mode
unbind -n C-d
bind-key -T copy-mode-vi C-d send-keys -X halfpage-down
bind-key r source-file ~/.tmux.conf \; run-shell '~/.tmux-sidebar.sh reset-all' \; display-message "tmux config reloaded"
# Restore classic Vim-like copy-mode flow in tmux 3.5+:
# - v starts selection
# - y copies selection and exits copy mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
# Search upward by default so most recent matches appear first
bind-key -T copy-mode-vi / command-prompt -p "(search up)" "send -X search-backward \"%%%\""

# Window navigation with Shift+Arrow
unbind -n C-Tab
unbind -n C-S-Tab
bind -n S-Left  previous-window
bind -n S-Right next-window
bind -n S-Up    swap-window -t -1\; select-window -t -1
bind -n S-Down  swap-window -t +1\; select-window -t +1

# Vim-style pane navigation (no prefix required)
# Pass Ctrl-hjkl through to Vim/Neovim panes; otherwise move tmux panes.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
is_codex="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+/)?(codex|ocdex)$'"
bind -n C-h if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind -n C-j if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind -n C-k if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind -n C-l if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
bind -n 'C-\' if-shell "$is_vim" 'send-keys C-\' 'select-pane -l'
bind -n M-Enter if-shell "$is_codex" 'send-keys C-j' 'send-keys M-Enter'
bind -T copy-mode-vi C-h select-pane -L
bind -T copy-mode-vi C-j select-pane -D
bind -T copy-mode-vi C-k select-pane -U
bind -T copy-mode-vi C-l select-pane -R
bind -T copy-mode-vi 'C-\' select-pane -l

# Session picker: choose-tree with AI badges + git branch. Cmd-1..9 jumps via the
# sidebar rail; see ~/.tmux-sidebar.sh.
bind-key s run-shell '~/.tmux-update-branches.sh' \; choose-tree -s -O name -K '#{e|+:#{line},1}' -F '#{?#{@session_ai_idle},! ,#{?#{@session_ai_thinking},💭 ,}}#{?#{@git_branch},[#{@git_branch}] ,}#{?session_attached,(attached),}'
# Persistent session rail. Global toggle; new windows are backfilled by hook.
# See ~/.tmux-sidebar.sh.
bind-key b run-shell '~/.tmux-sidebar.sh toggle'
set-hook -g window-linked "run-shell '~/.tmux-sidebar.sh ensure #{window_id}'"
set-hook -g client-session-changed "run-shell '~/.tmux-sidebar.sh refresh'"
set-hook -g session-created "run-shell '~/.tmux-sidebar.sh refresh'"
set-hook -g session-closed "run-shell '~/.tmux-sidebar.sh refresh'"
set-hook -g session-renamed "run-shell '~/.tmux-sidebar.sh refresh'"
set-hook -g window-renamed "run-shell '~/.tmux-sidebar.sh refresh'"
# Cmd 1-9 via Ghostty private user-keys; jump by list-order session number.
set -s user-keys[1] "\033[1z"
set -s user-keys[2] "\033[2z"
set -s user-keys[3] "\033[3z"
set -s user-keys[4] "\033[4z"
set -s user-keys[5] "\033[5z"
set -s user-keys[6] "\033[6z"
set -s user-keys[7] "\033[7z"
set -s user-keys[8] "\033[8z"
set -s user-keys[9] "\033[9z"
bind-key -n User1 run-shell '~/.tmux-sidebar.sh switch 1 "#{client_name}"'
bind-key -n User2 run-shell '~/.tmux-sidebar.sh switch 2 "#{client_name}"'
bind-key -n User3 run-shell '~/.tmux-sidebar.sh switch 3 "#{client_name}"'
bind-key -n User4 run-shell '~/.tmux-sidebar.sh switch 4 "#{client_name}"'
bind-key -n User5 run-shell '~/.tmux-sidebar.sh switch 5 "#{client_name}"'
bind-key -n User6 run-shell '~/.tmux-sidebar.sh switch 6 "#{client_name}"'
bind-key -n User7 run-shell '~/.tmux-sidebar.sh switch 7 "#{client_name}"'
bind-key -n User8 run-shell '~/.tmux-sidebar.sh switch 8 "#{client_name}"'
bind-key -n User9 run-shell '~/.tmux-sidebar.sh switch 9 "#{client_name}"'
# New window creation
bind-key c new-window -c "#{pane_current_path}"
bind-key C command-prompt -p "new session name:" "new-session -c '#{pane_current_path}' -s '%%'"
# Kill the whole session (X), switching this client to another session first.
bind-key X confirm-before -p "kill session #S? (y/n)" "run-shell '~/.tmux-kill-session.sh #{q:session_name} #{q:client_name}'"
# Create ../<repo>-worktrees/NAME, seed an agents/vim session, launch agent.
bind-key W command-prompt -p "worktree/branch name:" "run-shell \"~/.tmux-worktree.sh --path '#{pane_current_path}' --name '%%'\""
# Project setup: ensure agents/vim windows exist in the CURRENT session,
# rooted at the current pane's directory. The current window is claimed as the
# first (agents); no new session or switch. Then the vim window is dropped into
# Neovim + Diffview (<leader>gd) unless it's already editing. The setup helper
# stays structural; the editor launch lives in ~/.tmux-setup-vim.sh.
# (Overrides the default `prefix t` clock view.)
bind-key t run-shell "~/.tmux-setup-sessions.sh --session '#{session_name}' --window '#{window_id}' '#{pane_current_path}' && ~/.tmux-setup-vim.sh '#{session_name}'"

### POPUPS ###
# Floating popups (tmux 3.2+). Styled to match the Solarized theme.
set-option -g popup-border-lines rounded
set-option -g popup-border-style "fg=#{@solarized_blue}"
set-option -g popup-style "bg=#{@solarized_base03},fg=#{@solarized_base1}"

# prefix e: ephemeral scratch shell rooted at the current pane's directory.
bind-key e display-popup -E -w 80% -h 75% -d "#{pane_current_path}"
# prefix g: git TUI popup. Prefer lazygit/gitui/tig if installed; otherwise drop
# into a shell showing `git status` so the binding is useful before any are set up.
bind-key g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" 'if command -v lazygit >/dev/null 2>&1; then exec lazygit; elif command -v gitui >/dev/null 2>&1; then exec gitui; elif command -v tig >/dev/null 2>&1; then exec tig; else git -c color.ui=always status; echo; exec "${SHELL:-/bin/zsh}"; fi'

### TERMINAL SETTINGS ###
# Neovim color compatibility
set -g default-terminal "tmux-256color"
set-option -as terminal-features ",xterm-256color:RGB,xterm-ghostty:RGB"

### UI THEME ###
# Solarized Dark palette
set-option -g @solarized_base03 "#002b36"
set-option -g @solarized_base02 "#073642"
set-option -g @solarized_base01 "#586e75"
set-option -g @solarized_base00 "#657b83"
set-option -g @solarized_base1 "#93a1a1"
set-option -g @solarized_base2 "#eee8d5"
set-option -g @solarized_yellow "#b58900"
set-option -g @solarized_red "#dc322f"
set-option -g @solarized_blue "#268bd2"
set-option -g @solarized_cyan "#2aa198"

# Powerline separator glyphs (require a Nerd Font / patched font in the terminal).
# right-pointing solid/thin are used on the left side; left-pointing on the right.
set-option -g @pl_right ""
set-option -g @pl_right_thin ""
set-option -g @pl_left ""
set-option -g @pl_left_thin ""

set-option -g status-style "fg=#{@solarized_base1},bg=#{@solarized_base02}"
set-option -g status-justify left
set-option -g mode-style "fg=#{@solarized_base03},bg=#{@solarized_blue},bold"
set-option -g message-style "fg=#{@solarized_base03},bg=#{@solarized_blue}"
set-option -g message-command-style "fg=#{@solarized_base03},bg=#{@solarized_cyan}"

# Window tabs
set-window-option -g window-status-style "fg=#{@solarized_base00},bg=#{@solarized_base02}"
set-window-option -g window-status-current-style "fg=#{@solarized_base03},bg=#{@solarized_blue},bold"
set-window-option -g window-status-bell-style "fg=#{@solarized_base03},bg=#{@solarized_red},bold"
set-window-option -g window-status-separator ""
set-window-option -g window-status-format ' #I:#W '
# Active tab pops out of the flat base02 bar with powerline arrows on both sides.
set-window-option -g window-status-current-format "#[fg=#{@solarized_base02},bg=#{@solarized_blue}]#{@pl_right}#[fg=#{@solarized_base03},bg=#{@solarized_blue},bold] #I:#W#{?window_zoomed_flag,[Z],} #[fg=#{@solarized_blue},bg=#{@solarized_base02}]#{@pl_right}"

# Pane borders and pane numbers
set-option -g pane-border-style "fg=#{@solarized_base01}"
set-option -g pane-active-border-style "fg=#{@solarized_blue},bold"
set-option -g pane-border-status off
set-option -g display-panes-active-colour "#268bd2"
set-option -g display-panes-colour "#657b83"

# Auto-rebalance panes after splitting or closing.
# If the source pane is running an agent CLI (claude/codex), mirror that command
# into the new split; everywhere else this is a plain rebalanced split. See
# ~/.tmux-agent-split.sh.
bind-key % run-shell "~/.tmux-agent-split.sh h '#{pane_id}'"
bind-key '"' run-shell "~/.tmux-agent-split.sh v '#{pane_id}'"
bind-key \\ run-shell "~/.tmux-agent-split.sh h '#{pane_id}'"
bind-key - run-shell "~/.tmux-agent-split.sh v '#{pane_id}'"
# Keep the rail fixed while rebalancing only work panes. window-resized fires
# once after the window geometry settles; after-resize-pane only re-pins the
# rail so manual pane drags aren't overwritten.
set-hook -g window-resized "run-shell '~/.tmux-sidebar.sh layout-hook window-resize #{window_id} #{window_zoomed_flag}'"
set-hook -g after-resize-pane "run-shell '~/.tmux-sidebar.sh layout-hook resize #{window_id} #{window_zoomed_flag}'"
set-hook -g pane-exited "run-shell '~/.tmux-sidebar.sh layout-hook exit #{window_id}'"

# Dim inactive panes
set-option -g window-style "bg=#{@solarized_base02}"
set-option -g window-active-style "bg=#{@solarized_base03}"

# Status sections
set-option -g status-left-length 60
set-option -g status-right-length 50
# Left: session segment (blue) -> git branch segment (base01) -> bar.
set-option -g status-left "#[fg=#{@solarized_base03},bg=#{@solarized_blue},bold] #S #[fg=#{@solarized_blue},bg=#{@solarized_base01},nobold]#{@pl_right}#[fg=#{@solarized_base2},bg=#{@solarized_base01}] #(cd #{pane_current_path} && git rev-parse --abbrev-ref HEAD 2>/dev/null) #[fg=#{@solarized_base01},bg=#{@solarized_base02}]#{@pl_right}"
# Right: date segment (base01) -> time segment (blue). AI idle/thinking detection
# is driven by the sidebar's refresh tick (it runs ~/.tmux-ai-idle.sh).
set-option -g status-right "#[fg=#{@solarized_base01},bg=#{@solarized_base02}]#{@pl_left}#[fg=#{@solarized_base1},bg=#{@solarized_base01},nobold] %a %b %d #[fg=#{@solarized_blue},bg=#{@solarized_base01}]#{@pl_left}#[fg=#{@solarized_base03},bg=#{@solarized_blue},bold] %I:%M %p "

# Clock view
set-window-option -g clock-mode-colour "#b58900"

# Backfill the session rail on config load/server start.
run-shell '~/.tmux-sidebar.sh ensure-all'
